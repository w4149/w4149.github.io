<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>录音</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      touch-action: manipulation;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-color: #ffffff;
    }

    .sdk-error {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fef3c7;
      color: #92400e;
      padding: 8px 16px;
      font-size: 14px;
      text-align: center;
      z-index: 100;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 2rem;
      text-align: center;
    }

    #status {
      font-size: 1.25rem;
      color: #4b5563;
      margin-bottom: 1rem;
      text-align: center;
    }

    #timer {
      font-size: 2.25rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 3rem;
      text-align: center;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 20rem;
    }

    .btn {
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 9999px;
      font-size: 1.25rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .btn-blue {
      background-color: #3b82f6;
      color: #ffffff;
    }

    .btn-blue:hover {
      background-color: #2563eb;
    }

    .btn-red {
      background-color: #ef4444;
      color: #ffffff;
    }

    .btn-red:hover {
      background-color: #dc2626;
    }

    .btn-gray {
      background-color: #e5e7eb;
      color: #1f2937;
    }

    .btn-gray:hover {
      background-color: #d1d5db;
    }

    .hidden {
      display: none !important;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-content {
      background-color: #ffffff;
      border-radius: 1rem;
      padding: 1.5rem;
      width: 80%;
      max-width: 20rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 1rem;
      text-align: center;
    }

    .modal-text {
      color: #4b5563;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
    }

    .modal-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .qrcode-section {
      margin-top: 3rem;
      text-align: center;
    }

    .qrcode-label {
      color: #4b5563;
      margin-bottom: 1rem;
    }

    #qrcode canvas {
      margin: 0 auto;
    }

    .recording-indicator {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }

    .text-red-500 {
      color: #ef4444;
    }

    .font-medium {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="sdkError" class="sdk-error hidden">
    提示：部分外部库加载失败，录音功能可用但上传功能暂时不可用。请确保网络连接后刷新页面重试。
  </div>

  <h1>录音</h1>

  <div id="status">准备就绪</div>
  <div id="timer">00:00</div>

  <div class="button-container">
    <button id="startBtn" class="btn btn-blue">
      开始录音
    </button>
    <button id="stopBtn" class="btn btn-red hidden">
      结束录音
    </button>
  </div>

  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 class="modal-title">录音完成</h2>
      <p class="modal-text">是否上传录音？</p>
      <div class="modal-buttons">
        <button id="retryBtn" class="modal-btn btn-gray">
          重录
        </button>
        <button id="uploadBtn" class="modal-btn btn-blue">
          上传
        </button>
      </div>
    </div>
  </div>

  <div id="successModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 class="modal-title">上传成功</h2>
      <p class="modal-text">上传成功，我们会定期更新搜集到的声音，感谢您的时间。</p>
      <button id="okBtn" class="modal-btn btn-blue" style="width: 100%;">
        确定
      </button>
    </div>
  </div>

  <div class="qrcode-section">
    <p class="qrcode-label" style="color: #9ca3af; font-size: 0.875rem;">录音最长时间2分钟</p>
  </div>

  <script src="audioUpload/lib/cos-js-sdk-v5.min.js"></script>
  <script src="audioUpload/lib/qrcode.min.js"></script>
  <script src="audioUpload/js/recorder.js"></script>
  <script src="audioUpload/js/upload.js"></script>
  <script src="audioUpload/js/app.js"></script>
  <script>
    if (typeof COS === 'undefined' || typeof QRCode === 'undefined') {
      document.getElementById('sdkError').classList.remove('hidden');
    }
  </script>
</body>
</html>
